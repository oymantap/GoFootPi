<!DOCTYPE html>
<html>
<body>
    <input type="text" id="s" placeholder="Cari pemain...">
    <button onclick="cari()">Cari</button>
    <div id="res"></div>

    <script>
    function cari() {
        const val = document.getElementById('s').value;
        const out = document.getElementById('res');
        out.innerHTML = "Mencari...";

        fetch('https://gofootpi.42web.io/api.php?search=' + encodeURIComponent(val))
            .then(r => r.json())
            .then(d => {
                out.innerHTML = "";
                if(d.data.length === 0) { out.innerHTML = "Tidak ada data."; return; }
                d.data.forEach(p => {
                    out.innerHTML += `<p>${p.name} - ${p.club} (${p.market_value})</p>`;
                });
            })
            .catch(e => out.innerHTML = "Gagal total: " + e);
    }
    </script>
</body>
</html>
